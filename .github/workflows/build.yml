name: build

on: [push, pull_request]

permissions: read-all

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy3.11']
        architecture: [x86, x64, arm64]
        exclude:
          - os: ubuntu-latest
            architecture: x86
          - os: ubuntu-latest
            architecture: arm64
          - os: macos-latest
            architecture: x86
          - os: macos-latest
            architecture: x64
          - os: windows-latest
            architecture: arm64
          - os: windows-latest
            python: pypy3.11
          - os: macos-latest
            python: pypy3.11


    name: ${{ matrix.os }} Py ${{ matrix.python }} ${{ matrix.architecture }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.architecture }}

      - name: Install the project
        if: ${{ !(startsWith(matrix.os, 'windows') && matrix.architecture == 'x86') }}
        run: uv sync --all-extras

      - name: Install the project (Windows x86)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.architecture == 'x86' }}
        run: |
          uv venv
          uv pip install --group dev -c .github/constraints/windows-x86.txt -e ".[http,usb]"

      - name: Run pre-commit
        if: "!startsWith(matrix.python, 'pypy')"
        run: |
          uv tool install pre-commit
          pre-commit run --all-files --verbose

      - name: Run unit tests
        run: uv run --no-sync pytest -v -k "not device"

  device_test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    name: Device tests ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Install the project
        run: uv sync --extra http

      - name: Set up tunnel
        env:
          tlspwd: ${{ secrets.TLSPWD }}
        run: |
          openssl aes-256-cbc -k "$tlspwd" -md sha256 -in ./.ci/client-combined.pem.enc -out ./.ci/client-combined.pem -d
          export krnl="$(uname -s | tr '[:upper:]' '[:lower:]')"
          wget https://github.com/square/ghostunnel/releases/download/v1.3.1/ghostunnel-v1.3.1-$krnl-amd64-with-pkcs11 -O ghostunnel
          chmod +x ./ghostunnel
          ./ghostunnel client --listen localhost:12345 --target hsm-connector01.sthlm.in.yubico.org:8443 --keystore ./.ci/client-combined.pem --cacert ./.ci/server-crt.pem 2>/dev/null &
          sleep 3
          echo "BACKEND=$(curl http://localhost:12345/dispatcher/request)" >> $GITHUB_ENV

      - name: Run device tests
        if: ${{ env.BACKEND }}
        run: |
          echo Using backend $BACKEND
          uv run pytest -v --backend "$BACKEND" tests/device/

      - name: Release HSM
        if: ${{ always() && env.BACKEND }}
        run: curl "http://localhost:12345/dispatcher/release?connector=$BACKEND"

  sdist:
    runs-on: ubuntu-latest
    name: Build Python source .tar.gz

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Build source package
        run: uv build

      - name: Upload source package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-yubihsm-sdist
          path: dist

  docs:
    runs-on: ubuntu-latest
    name: Build sphinx documentation

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Install the project
        run: uv sync --all-extras

      - name: Build sphinx documentation
        run: uv run make -C docs/ html

      - name: Upload documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-yubihsm-docs
          path: docs/_build/html
